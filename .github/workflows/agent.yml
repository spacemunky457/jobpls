name: Job Agent

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours (UTC). GitHub can delay/skip scheduled
                            # runs, so we run often — each run catches up via the
                            # LAST_DIGEST_AT marker, so frequent runs never double-email.
  workflow_dispatch:          # also triggerable manually from the Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run agent
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # AI keys and email keys are stored per-user in the DB (Settings → AI / Email).
          # No other secrets needed here unless you want system-level fallbacks.
        run: python run_agent.py
